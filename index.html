<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>VOID TECH VCF</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
  :root {
    --bg: #0f172a; --card: rgba(30,41,59,0.8); --text: #e2e8f0; 
    --text2: #94a3b8; --border: rgba(51,65,85,0.5); --accent: #38bdf8;
  }
  [data-theme="light"] {
    --bg: #f8fafc; --card: rgba(255,255,255,0.8); --text: #1e293b; 
    --text2: #475569; --border: rgba(203,213,225,0.6); --accent: #0ea5e9;
  }
  *{box-sizing:border-box}
  body{font-family:system-ui,-apple-system,sans-serif;max-width:750px;margin:0 auto;padding:30px 20px;
    background:var(--bg);color:var(--text);min-height:100vh;transition:0.3s}
  .card{background:var(--card);padding:24px;border-radius:16px;margin-bottom:24px;border:1px solid var(--border);
    backdrop-filter:blur(12px);box-shadow:0 8px 32px rgba(0,0,0,0.2)}
  h1{color:var(--accent);margin:0;font-size:32px;font-weight:800}
  h1 span{color:#facc15}
  input,button{width:100%;padding:14px 16px;margin:10px 0;border-radius:10px;border:1px solid var(--border);
    background:rgba(15,23,42,0.6);color:var(--text);font-size:15px}
  button{background:linear-gradient(135deg,#38bdf8 0%,#0ea5e9 100%);color:#0f172a;font-weight:700;cursor:pointer;border:none}
  button:hover{transform:translateY(-2px)}
  table{width:100%;border-collapse:collapse;margin-top:16px}
  th,td{padding:12px 16px;border-bottom:1px solid var(--border);text-align:left}
  th{color:var(--text2);font-weight:600;font-size:13px;text-transform:uppercase}
  .status{padding:14px;border-radius:10px;margin-top:12px;text-align:center;font-weight:600}
  .status.open{background:linear-gradient(135deg,#22c55e 0%,#16a34a 100%);color:white}
  .status.closed{background:linear-gradient(135deg,#ef4444 0%,#dc2626 100%);color:white}
  .hidden{display:none}
  .header{display:flex;justify-content:space-between;align-items:center;margin-bottom:32px}
  .theme-toggle{width:auto;padding:10px 16px;background:var(--card);color:var(--text);border:1px solid var(--border);border-radius:10px;cursor:pointer}
</style>
</head>
<body>

<div class="header">
  <h1>VOID <span>TECH</span> VCF</h1>
  <button class="theme-toggle" onclick="toggleTheme()">🌙 Dark</button>
</div>

<div class="card">
  <h3>Register Contact</h3>
  <div id="statusBox" class="status open">Checking status...</div>
  <div id="formBox">
    <input id="name" placeholder="Full Name" required>
    <input id="phone" placeholder="Phone Number" required>
    <button id="addBtn">Add Contact</button>
  </div>
  <p id="countText"></p>
</div>

<div class="card">
  <h3>Admin Panel</h3>
  <div id="loginBox">
    <input id="adminPass" type="password" placeholder="Enter admin password">
    <button onclick="unlock()">Unlock Dashboard</button>
  </div>
  
  <div id="adminBox" class="hidden">
    <p id="count">Loading...</p>
    <input id="limitInput" type="number" placeholder="Set contact limit">
    <button onclick="updateLimit()">Update Limit</button>
    <table id="table">
      <thead><tr><th>#</th><th>Name</th><th>Phone</th><th>Time</th></tr></thead>
      <tbody></tbody>
    </table>
    <button onclick="exportPDF()">📄 Export PDF</button>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, push, set, get, child } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyDYPSde2NucBHEU2NLhFtOlIqMCGb4_sOg",
  authDomain: "void-vcf-f01c4.firebaseapp.com",
  databaseURL: "https://void-vcf-f01c4-default-rtdb.firebaseio.com",
  projectId: "void-vcf-f01c4",
  storageBucket: "void-vcf-f01c4.firebasestorage.app",
  messagingSenderId: "158683029881",
  appId: "1:158683029881:web:326714309ffba75dd70fa8"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const ADMIN_PASSWORD = "MRVOOID";

let people = [];
let config = { limit: 500, enabled: true };

// Theme
function toggleTheme() {
  const t = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', t);
  localStorage.setItem('theme', t);
  document.querySelector('.theme-toggle').textContent = t==='dark' ? '☀️ Light' : '🌙 Dark';
}
document.documentElement.setAttribute('data-theme', localStorage.getItem('theme') || 'dark');

// Load config and count
async function loadConfig() {
  try {
    const snap = await get(child(ref(db), 'settings/config'));
    if (snap.exists()) config = snap.val();
    else await set(ref(db, 'settings/config'), config);
    
    const peopleSnap = await get(child(ref(db), 'registrations'));
    const count = peopleSnap.exists() ? Object.keys(peopleSnap.val()).length : 0;
    document.getElementById('countText').textContent = `${count}/${config.limit} spots filled`;
    
    if (!config.enabled || count >= config.limit) {
      document.getElementById('formBox').classList.add('hidden');
      document.getElementById('statusBox').className = 'status closed';
      document.getElementById('statusBox').textContent = 'Registration Closed';
    } else {
      document.getElementById('statusBox').className = 'status open';
      document.getElementById('statusBox').textContent = 'Registration Open';
    }
  } catch(e) {
    console.error(e);
    document.getElementById('statusBox').className = 'status closed';
    document.getElementById('statusBox').textContent = 'Error: Check console';
  }
}
loadConfig();

// Add contact
document.getElementById('addBtn').addEventListener('click', async () => {
  const name = document.getElementById('name').value.trim();
  const phone = document.getElementById('phone').value.trim().replace(/[\s\-\(\)]/g, '');
  if (!name || !phone) return alert('Fill both fields');
  
  const peopleSnap = await get(child(ref(db), 'registrations'));
  const count = peopleSnap.exists() ? Object.keys(peopleSnap.val()).length : 0;
  if (count >= config.limit) return alert('Registration full');
  
  if (peopleSnap.exists()) {
    const existing = Object.values(peopleSnap.val());
    if (existing.some(p => p.phoneNormalized === phone)) {
      return alert('Phone already registered');
    }
  }
  
  const newRef = push(ref(db, 'registrations'));
  await set(newRef, {
    name, 
    phone: document.getElementById('phone').value.trim(),
    phoneNormalized: phone, 
    createdAt: Date.now()
  });
  
  document.getElementById('name').value = '';
  document.getElementById('phone').value = '';
  alert('Registered!');
  loadConfig();
});

// Admin unlock
window.unlock = async function() {
  if (document.getElementById('adminPass').value !== ADMIN_PASSWORD) return alert('Wrong password');
  
  const snap = await get(child(ref(db), 'registrations'));
  people = snap.exists() ? Object.values(snap.val()).sort((a,b)=>b.createdAt-a.createdAt) : [];
  
  document.getElementById('count').textContent = `${people.length}/${config.limit} contacts`;
  document.getElementById('limitInput').value = config.limit;
  document.querySelector('#table tbody').innerHTML = people.map((p,i)=>`
    <tr><td>${i+1}</td><td>${p.name}</td><td>${p.phone}</td><td>${new Date(p.createdAt).toLocaleString()}</td></tr>
  `).join('');
  
  document.getElementById('loginBox').classList.add('hidden');
  document.getElementById('adminBox').classList.remove('hidden');
}

// Update limit
window.updateLimit = async function() {
  const lim = parseInt(document.getElementById('limitInput').value);
  if (!lim) return alert('Enter valid limit');
  config.limit = lim;
  await set(ref(db, 'settings/config'), config);
  alert('Limit updated');
  loadConfig();
}

// Export PDF
window.exportPDF = function() {
  if (!people.length) return alert('No data');
  const {jsPDF} = window.jspdf;
  const doc = new jsPDF();
  doc.text('VOID TECH VCF Contacts', 14, 20);
  doc.text(`Generated: ${new Date().toLocaleString()}`, 14, 30);
  let y=45;
  people.forEach((p,i)=>{
    if(y>270){doc.addPage();y=20}
    doc.text(`${i+1}. ${p.name} - ${p.phone}`,14,y);
    y+=10;
  });
  doc.save('contacts.pdf');
}
</script>
</body>
</html>
